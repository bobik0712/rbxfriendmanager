<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RBX Friend Manager</title>

    <link rel="stylesheet" href="css/style.css">


</head>

<body>

<header>

    <div class="header-container">

        <h1>RBX Friend Manager</h1>

    </div>

</header>

<main>

    <section class="search-box">

        <h2>Search Roblox Player</h2>

        <p>
            Enter a Roblox username to view public friends and statistics.
        </p>

        <input
            type="text"
            id="username"
            placeholder="Enter Roblox Username..."
        >

        <button id="searchButton">

            Search

        </button>

    </section>

    <section class="info">

        <div class="card">

            <h3>👥 Friends</h3>

            <p>View public friend lists.</p>

        </div>

        <div class="card">

            <h3>🟢 Online</h3>

            <p>See who is online.</p>

        </div>

        <div class="card">

            <h3>📊 Statistics</h3>

            <p>Analyze friend activity.</p>

        </div>

        <div class="card">

            <h3>🖼 Profiles</h3>

            <p>Open friend cards.</p>

        </div>

    </section>

</main>

<footer>

    RBX Friend Manager © 2026

</footer>

<script src="js/app.js"></script>

</body>

</html>
