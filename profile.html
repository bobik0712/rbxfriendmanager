<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RBX Friend Manager</title>

    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

<header>

    <div class="header-container">

        <h1>RBX Friend Manager</h1>

    </div>

</header>

<main>

    <section class="profile">

        <img
            id="avatar"
            src="https://placehold.co/180x180"
            alt="Avatar"
        >

        <h2 id="displayName">
            Loading...
        </h2>

        <p id="usernameText">
            @Loading...
        </p>

    </section>

    <section class="stats">

        <div class="stat">

            <h3>Friends</h3>

            <p id="friendsCount">0</p>

        </div>

        <div class="stat">

            <h3>Online</h3>

            <p id="onlineCount">0</p>

        </div>

        <div class="stat">

            <h3>Followers</h3>

            <p id="followersCount">0</p>

        </div>

        <div class="stat">

            <h3>Following</h3>

            <p id="followingCount">0</p>

        </div>

    </section>

    <section class="friendSearch">

        <input
            type="text"
            id="friendSearch"
            placeholder="Search Friends..."
        >

    </section>

    <section id="friendGrid">

        <!-- Тут JavaScript створюватиме картки друзів -->

    </section>

</main>

<footer>

RBX Friend Manager © 2026

</footer>

<script>
    console.log("Before api");
</script>

<script src="js/api.js"></script>

<script>
    console.log("After api:", typeof getUserId);
</script>

<script src="js/profile.js"></script>

</body>
</html>
